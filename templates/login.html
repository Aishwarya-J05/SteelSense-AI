{% extends "base.html" %}
{% block content %}
<style>
.login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    position: relative;
    z-index: 1;
}

.login-box { width: 100%; max-width: 420px; }

.login-logo { text-align: center; margin-bottom: 28px; }

.login-logo h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.login-logo h2 span { color: var(--accent); }

.login-logo p {
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.login-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
}

.tabs {
    display: flex;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 20px;
}

.tab {
    flex: 1; text-align: center; padding: 9px;
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--muted); border-radius: 6px; transition: all 0.15s;
    background: none; border: none; font-family: 'Barlow', sans-serif;
}

.tab.active { background: var(--bg4); color: var(--text); border: 1px solid var(--border2); }

.form-panel { display: none; }
.form-panel.active { display: block; }

.form-group { margin-bottom: 14px; }

.form-label {
    display: block; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-bottom: 7px;
    font-family: 'DM Mono', monospace;
}

.form-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); border-radius: 7px; padding: 11px 14px;
    font-size: 14px; font-family: 'Barlow', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    -webkit-appearance: none;
    appearance: none;
}

.form-input:focus {
    border-color: rgba(74,158,255,0.5);
    box-shadow: 0 0 0 3px rgba(74,158,255,0.08);
}

.form-input::placeholder { color: var(--muted); }

.btn-full { width: 100%; margin-top: 6px; padding: 13px; font-size: 15px; }

.back-link {
    display: block; text-align: center; margin-top: 16px;
    color: var(--muted); font-size: 12px; text-decoration: none;
    font-family: 'DM Mono', monospace; transition: color 0.15s;
}

.back-link:hover { color: var(--text2); }
</style>

<div class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <h2>Steel<span>Sense</span> AI</h2>
            <p>Industrial Defect Detection Platform</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <div class="login-card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <div class="form-panel active" id="panel-login">
                <form method="POST">
                    <input type="hidden" name="action" value="login">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
                </form>
            </div>

            <div class="form-panel" id="panel-signup">
                <form method="POST">
                    <input type="hidden" name="action" value="signup">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-input" placeholder="Your name" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
                </form>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
}

document.addEventListener("DOMContentLoaded", function () {
    const showSignup = "{{ request.form.get('action') }}" === "signup";
    const hasError = "{{ error }}" !== "None" && "{{ error }}" !== "";
    if (showSignup && hasError) switchTab("signup");
});
</script>
{% endblock %}
